<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Welcome to E-Commerce Shopping...</title>

  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="vh-100">

  <div class="container-fluid h-100">
    <div class="row h-100">
      <!-- Left side -->
      <div class="col-md-6 bg-dark text-white d-flex flex-column justify-content-center align-items-center">
        <h1 class="text-center">Welcome to<br>E-Commerce Shopping</h1>
      </div>

      <!-- Right side -->
      <div class="col-md-6 d-flex justify-content-center align-items-center bg-light">
        <div class="w-75">
          <h2 class="text-center mb-4">Login</h2>
          <form>
            <div class="mb-3">
              <label for="email" class="form-label">Email</label>
              <input type="email" class="form-control" id="email" >
            </div>

            <div class="mb-3">
              <label for="password" class="form-label">Password</label>
              <input type="password" class="form-control" id="password">
            </div>

            <div class="d-flex justify-content-center">
              <button type="submit" class="btn btn-dark">Login</button>
            </div>
          </form>

          <p class="text-center mt-3">
            Don't have an account? <a href="http://127.0.0.1:5501/s2.html" class="text-dark">Sign up</a>
          </p>
        </div>
      </div>
    </div>
  </div>

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
